<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980" role="img" aria-labelledby="title desc">
  <title id="title">MumbaiNav Architecture Diagram</title>
  <desc id="desc">Layered architecture showing Flutter, Express, routing, Gemini, Socket.io, synthetic jobs, PostgreSQL/PostGIS, Supabase, and OpenCity reference data with explicit interaction labels.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbfc"/>
      <stop offset="100%" stop-color="#eef4f7"/>
    </linearGradient>
    <linearGradient id="apiGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b5563"/>
      <stop offset="100%" stop-color="#0f7b88"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#17324d" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#49627a"/>
    </marker>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #16324f; }
      .subtitle { font: 400 14px 'Segoe UI', Arial, sans-serif; fill: #5b7086; }
      .layer-title { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #17324d; }
      .box-title { font: 700 17px 'Segoe UI', Arial, sans-serif; fill: #17324d; }
      .box-title-light { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #ffffff; }
      .box-text { font: 400 13px 'Segoe UI', Arial, sans-serif; fill: #456179; }
      .box-text-light { font: 400 13px 'Segoe UI', Arial, sans-serif; fill: #dce9ee; }
      .edge { stroke: #49627a; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .edge-dashed { stroke: #49627a; stroke-width: 2; fill: none; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .edge-label { font: 600 12px 'Segoe UI', Arial, sans-serif; fill: #26435f; }
      .pill { fill: #ffffff; stroke: #d7e2ea; stroke-width: 1; rx: 10; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <text x="70" y="58" class="title">MumbaiNav System Architecture</text>
  <text x="70" y="84" class="subtitle">Round 2 prototype for the Andheri to BKC corridor</text>

  <g filter="url(#shadow)">
    <rect x="55" y="120" width="1490" height="120" rx="24" fill="#f3f8fb" stroke="#d8e3ea"/>
    <rect x="55" y="270" width="1490" height="145" rx="24" fill="#f6fbfd" stroke="#d8e3ea"/>
    <rect x="55" y="445" width="1490" height="210" rx="24" fill="#f3f9fb" stroke="#d8e3ea"/>
    <rect x="55" y="685" width="1490" height="165" rx="24" fill="#f8fbfd" stroke="#d8e3ea"/>
    <rect x="55" y="875" width="1490" height="70" rx="24" fill="#f4f8fb" stroke="#d8e3ea"/>
  </g>

  <text x="85" y="155" class="layer-title">User Layer</text>
  <text x="85" y="305" class="layer-title">API Layer</text>
  <text x="85" y="480" class="layer-title">Services Layer</text>
  <text x="85" y="720" class="layer-title">Data Layer</text>
  <text x="85" y="910" class="layer-title">External Services</text>

  <g filter="url(#shadow)">
    <rect x="180" y="155" width="330" height="60" rx="18" fill="#ffffff" stroke="#d7e2ea"/>
    <text x="205" y="191" class="box-title">Flutter App</text>
    <text x="330" y="191" class="box-text">Home, Results, Live Update screens</text>

    <rect x="1120" y="145" width="300" height="82" rx="18" fill="#ffffff" stroke="#d7e2ea"/>
    <text x="1145" y="180" class="box-title">Real-time Layer</text>
    <text x="1145" y="201" class="box-text">Socket.io client and Socket.io server channel</text>

    <rect x="525" y="300" width="550" height="84" rx="20" fill="url(#apiGrad)" stroke="#0b5f6c"/>
    <text x="550" y="337" class="box-title-light">Express API Server</text>
    <text x="550" y="359" class="box-text-light">REST endpoints, health checks, request orchestration, Socket.io server</text>

    <rect x="110" y="500" width="300" height="120" rx="20" fill="#ffffff" stroke="#d7e2ea"/>
    <text x="135" y="535" class="box-title">Temporal A* Routing Engine</text>
    <text x="135" y="558" class="box-text">Frequency-aware temporal search</text>
    <text x="135" y="578" class="box-text">Mode-locked corridor strategies</text>
    <text x="135" y="598" class="box-text">Candidate generation by route family</text>

    <rect x="465" y="500" width="300" height="120" rx="20" fill="#ffffff" stroke="#d7e2ea"/>
    <text x="490" y="535" class="box-title">Live Condition Enrichment</text>
    <text x="490" y="558" class="box-text">Reads latest crowd density</text>
    <text x="490" y="578" class="box-text">Reads latest bike availability</text>
    <text x="490" y="598" class="box-text">Annotates route candidates</text>

    <rect x="820" y="500" width="300" height="120" rx="20" fill="#ffffff" stroke="#d7e2ea"/>
    <text x="845" y="535" class="box-title">Gemini Ranking Service</text>
    <text x="845" y="558" class="box-text">Builds prompt from candidates</text>
    <text x="845" y="578" class="box-text">Returns ranked routes and rationale</text>
    <text x="845" y="598" class="box-text">Falls back safely on AI error</text>

    <rect x="1175" y="485" width="300" height="150" rx="20" fill="#ffffff" stroke="#d7e2ea"/>
    <text x="1200" y="520" class="box-title">Synthetic Data Job</text>
    <text x="1200" y="543" class="box-text">Updates crowd_density rows</text>
    <text x="1200" y="563" class="box-text">Updates bike_availability rows</text>
    <text x="1200" y="583" class="box-text">Emits live_conditions_update</text>
    <text x="1200" y="603" class="box-text">Demo cadence currently set in code</text>

    <rect x="225" y="730" width="420" height="88" rx="20" fill="#ffffff" stroke="#d7e2ea"/>
    <text x="250" y="767" class="box-title">PostgreSQL + PostGIS</text>
    <text x="250" y="789" class="box-text">stations, edges, schedules, crowd_density, bike_availability</text>

    <rect x="895" y="730" width="300" height="88" rx="20" fill="#ffffff" stroke="#d7e2ea"/>
    <text x="920" y="767" class="box-title">Supabase Postgres Host</text>
    <text x="920" y="789" class="box-text">Managed connection target via DATABASE_URL</text>

    <rect x="205" y="894" width="360" height="34" rx="17" fill="#ffffff" stroke="#d7e2ea"/>
    <text x="225" y="916" class="box-title">Gemini API</text>
    <text x="330" y="916" class="box-text">Google GenAI endpoint</text>

    <rect x="830" y="894" width="500" height="34" rx="17" fill="#ffffff" stroke="#d7e2ea"/>
    <text x="850" y="916" class="box-title">OpenCity / BEST Reference Data</text>
    <text x="1095" y="916" class="box-text">seeded stations and bus-stop coordinates</text>
  </g>

  <path class="edge" d="M 510 185 C 595 185, 640 250, 770 300"/>
  <rect x="585" y="194" width="165" height="24" class="pill"/>
  <text x="597" y="210" class="edge-label">requests routes (REST)</text>

  <path class="edge" d="M 1120 186 C 960 186, 790 186, 510 185"/>
  <rect x="820" y="168" width="215" height="24" class="pill"/>
  <text x="832" y="184" class="edge-label">pushes live updates (WebSocket)</text>

  <path class="edge" d="M 770 384 C 760 430, 300 455, 265 500"/>
  <rect x="400" y="420" width="210" height="24" class="pill"/>
  <text x="412" y="436" class="edge-label">computes route candidates</text>

  <path class="edge" d="M 800 384 C 810 435, 615 450, 615 500"/>
  <rect x="625" y="420" width="205" height="24" class="pill"/>
  <text x="637" y="436" class="edge-label">enriches candidates with live state</text>

  <path class="edge" d="M 905 384 C 930 435, 970 450, 970 500"/>
  <rect x="920" y="420" width="160" height="24" class="pill"/>
  <text x="932" y="436" class="edge-label">ranks candidates</text>

  <path class="edge" d="M 1180 560 C 1060 560, 1015 425, 900 384"/>
  <rect x="1008" y="458" width="165" height="24" class="pill"/>
  <text x="1020" y="474" class="edge-label">emits live event signal</text>

  <path class="edge" d="M 315 620 C 315 670, 360 695, 420 730"/>
  <rect x="250" y="670" width="210" height="24" class="pill"/>
  <text x="262" y="686" class="edge-label">queries spatial graph and schedules</text>

  <path class="edge" d="M 615 620 C 615 670, 560 695, 520 730"/>
  <rect x="515" y="670" width="175" height="24" class="pill"/>
  <text x="527" y="686" class="edge-label">reads latest live conditions</text>

  <path class="edge" d="M 1315 635 C 1315 675, 1030 690, 1030 730"/>
  <rect x="1080" y="670" width="230" height="24" class="pill"/>
  <text x="1092" y="686" class="edge-label">writes crowd and bike updates</text>

  <path class="edge" d="M 1120 560 C 1190 560, 1260 455, 1260 227"/>
  <rect x="1240" y="365" width="185" height="24" class="pill"/>
  <text x="1252" y="381" class="edge-label">publishes Socket.io events</text>

  <path class="edge" d="M 970 620 C 970 760, 385 760, 385 818"/>
  <rect x="660" y="725" width="150" height="24" class="pill"/>
  <text x="672" y="741" class="edge-label">receives enriched candidates</text>

  <path class="edge" d="M 820 560 C 730 560, 620 805, 565 911"/>
  <rect x="590" y="735" width="230" height="24" class="pill"/>
  <text x="602" y="751" class="edge-label">calls Gemini API for structured ranking</text>

  <path class="edge" d="M 1080 818 C 1080 855, 1080 880, 1080 894"/>
  <rect x="980" y="834" width="200" height="24" class="pill"/>
  <text x="992" y="850" class="edge-label">hosts managed Postgres instance</text>

  <path class="edge" d="M 1030 730 C 1030 730, 795 730, 645 774"/>
  <rect x="760" y="705" width="145" height="24" class="pill"/>
  <text x="772" y="721" class="edge-label">stores persistent graph and state</text>

  <path class="edge" d="M 1080 894 C 1080 860, 1080 840, 1080 818"/>
  <rect x="905" y="780" width="235" height="24" class="pill"/>
  <text x="917" y="796" class="edge-label">provides DATABASE_URL hosting target</text>

  <path class="edge" d="M 1080 894 C 1080 880, 1080 855, 385 818"/>
  <rect x="620" y="835" width="180" height="24" class="pill"/>
  <text x="632" y="851" class="edge-label">seeds stations, stops, and references</text>

  <path class="edge-dashed" d="M 1260 227 C 1260 250, 1260 270, 1260 485"/>
  <rect x="1290" y="345" width="165" height="24" class="pill"/>
  <text x="1302" y="361" class="edge-label">maintains open WebSocket channel</text>
</svg>
